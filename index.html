<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POV Mystery Vlog Generator PRO</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

h1{
text-align:center;
}

input,button,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
}

input{
background:#1e293b;
color:white;
}

button{
background:#22c55e;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

textarea{
height:180px;
background:#020617;
color:#22c55e;
}

.copy{
background:#3b82f6;
}

.preview{
width:120px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>POV Mystery Vlog Prompt Generator</h1>

<div class="card">

<label>Upload Vlogger Photo Reference</label>
<input type="file" id="photoInput">

<img id="preview" class="preview">

<label>Number of Scenes</label>
<input type="number" id="sceneCount" value="3" min="3">

<button onclick="generate()">Generate Prompt</button>

</div>

<div class="card">

<button onclick="copyAll()">COPY ALL PROMPTS</button>

<div id="output"></div>

</div>

</div>

<script>

const locations=[
"abandoned underwater city",
"ancient underground alien temple",
"haunted floating island",
"giant crystal cave world",
"abandoned space colony",
"foggy mountain ghost town",
"lost jungle civilization",
"mysterious desert megastructure",
"frozen alien planet ruins",
"underground lava tunnel city",
"ancient titan skeleton valley",
"sunken pirate megacity",
"abandoned military bunker maze",
"dark forest full of ruins",
"alien jungle megatrees",
"floating rock planet",
"lost temple canyon",
"abandoned research station",
"giant cave ecosystem",
"hidden mountain city"
]

const creatures=[
"shadow creature",
"ancient guardian statue that moves",
"unknown alien entity",
"giant cave monster",
"mysterious glowing figure",
"strange humanoid silhouette",
"dark creature watching from distance"
]

const times=[
"sunset",
"midnight",
"foggy dawn",
"stormy evening",
"moonlit night"
]

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

document.getElementById("photoInput").onchange=function(e){

const reader=new FileReader()

reader.onload=function(){
document.getElementById("preview").src=reader.result
}

reader.readAsDataURL(e.target.files[0])

}

function narration(scene,total){

if(scene==1) return "Alright everyone, I just arrived here and this place already feels really strange."

if(scene==2) return "I'm walking deeper now. Everything around here looks abandoned."

if(scene==3) return "Wait... did you hear that sound? Something definitely moved."

if(scene<total) return "This place is getting more disturbing the deeper I go."

return "Okay that's it, something is definitely here. I'm leaving right now!"

}

function generate(){

const scenes=parseInt(document.getElementById("sceneCount").value)

const location=random(locations)
const time=random(times)
const creature=random(creatures)

let html=""

const imagePrompt=

`Hyper realistic POV vlog image

Main character: male vlogger using uploaded reference photo

Scene:
The vlogger arrives at a ${location} for the first time.

Environment:
extremely cinematic mysterious location
massive environmental storytelling
epic scale environment

Time:
${time}

Style:
hyper realistic
8k
photorealistic
cinematic lighting
documentary realism
`

html+=block("IMAGE PROMPT",imagePrompt)

let creatureScene=Math.floor(Math.random()*(scenes-2))+2

for(let i=1;i<=scenes;i++){

let action=""

if(i==1){
action="The vlogger slowly explores the entrance of the location."
}

else if(i==creatureScene){
action=`The vlogger suddenly notices a ${creature} in the distance.`
}

else if(i==scenes){
action="The vlogger runs away in fear while holding the camera."
}

else{
action="The vlogger continues exploring deeper while reacting to strange sounds."
}

let prompt=

`POV Mystery Exploration Video

Scene ${i}

Environment Lock:
${location}

Time:
${time}

Action:
${action}

Camera:
handheld POV vlog
natural shake
slow walking
environment scanning

Character:
male explorer vlogger using reference face

Narration (male english voice):
"${narration(i,scenes)}"

Sound:
wind ambience
distant echoes
strange noises
footsteps

Visual style:
hyper realistic
cinematic
8k
ultra detailed environment

Duration:
6 seconds
`

html+=block("VIDEO SCENE "+i,prompt)

}

const title=`I Explored a ${location} and Something Was Watching Me`

const hashtags="#mystery #povvlog #horrorvlog #exploration #foundfootage #creepy #adventure"

html+=block("YOUTUBE TITLE",title)
html+=block("HASHTAGS",hashtags)

document.getElementById("output").innerHTML=html

}

function block(title,text){

return `

<h3>${title}</h3>
<textarea>${text}</textarea>
<button class="copy" onclick="copy(this)">Copy</button>

`

}

function copy(btn){

const t=btn.previousElementSibling

t.select()

document.execCommand("copy")

}

function copyAll(){

const areas=document.querySelectorAll("textarea")

let txt=""

areas.forEach(a=>txt+=a.value+"\n\n")

navigator.clipboard.writeText(txt)

alert("All prompts copied")

}

</script>

</body>
</html>
