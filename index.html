<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POV Mystery Vlog Prompt Generator</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
}

input{
background:#334155;
color:white;
}

button{
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

textarea{
width:100%;
height:160px;
margin-top:10px;
background:#020617;
color:#22c55e;
padding:10px;
border-radius:8px;
}

.copyBtn{
background:#3b82f6;
margin-top:5px;
}

.copyBtn:hover{
background:#2563eb;
}

.preview{
width:120px;
border-radius:10px;
margin-top:10px;
}

</style>

</head>
<body>

<div class="container">

<h1>POV Mystery Vlog Prompt Generator</h1>

<div class="card">

<label>Upload Vlogger Reference Photo</label>
<input type="file" id="photoInput">

<img id="preview" class="preview">

<label>Number of Scenes (min 3)</label>
<input type="number" id="sceneCount" value="3" min="3">

<button onclick="generatePrompt()">Generate Prompt</button>

</div>


<div class="card">

<h2>Generated Prompts</h2>

<button onclick="copyAll()">COPY ALL PROMPTS</button>

<div id="output"></div>

</div>

</div>


<script>

const locations=[
"abandoned underwater city",
"mysterious alien jungle planet",
"ancient underground civilization",
"haunted floating island",
"lost desert megastructure",
"foggy ghost town in the mountains",
"abandoned futuristic space colony",
"giant cave world with glowing crystals",
"hidden temple inside jungle canyon",
"dark frozen alien planet"
]

const times=[
"sunset",
"midnight",
"foggy morning",
"stormy evening",
"moonlit night",
"dawn",
"rainy twilight"
]

const atmospheres=[
"mysterious",
"tense",
"eerie",
"ominous",
"cinematic",
"dark atmospheric"
]


document.getElementById("photoInput").onchange=function(e){

const reader=new FileReader()

reader.onload=function(){
document.getElementById("preview").src=reader.result
}

reader.readAsDataURL(e.target.files[0])

}


function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}


function generatePrompt(){

const sceneCount=document.getElementById("sceneCount").value

const location=random(locations)
const time=random(times)
const mood=random(atmospheres)

let output=""

const imagePrompt=

`HYPER REALISTIC POV VLOG IMAGE

Reference character: use uploaded reference photo as the main vlogger

Scene:
A mysterious exploration vlogger arrives at a ${location}.

Environment:
The location is extremely detailed and cinematic. The environment feels ${mood}. Massive environmental storytelling elements surround the area.

Time of day:
${time}

Camera:
POV vlog camera held in hand, ultra realistic lens, natural vlog framing

Style:
hyper realistic
cinematic lighting
8k
photorealistic
documentary realism
sharp details
volumetric lighting
epic atmosphere
`

output+=createBlock("IMAGE PROMPT",imagePrompt)

for(let i=1;i<=sceneCount;i++){

let story=""

if(i==1){

story=`The vlogger begins exploring the location carefully while talking to the camera.`

}

else if(i==sceneCount){

story=`The vlogger suddenly encounters something terrifying in the distance and starts running in panic.`

}

else{

story=`The exploration continues deeper into the mysterious location, strange sounds can be heard nearby.`

}

const videoPrompt=

`POV MYSTERY VLOG VIDEO PROMPT

SCENE ${i}

Environment Lock:
${location}

Time:
${time}

Atmosphere:
${mood}

Action:
${story}

Camera Movement:
natural handheld vlog camera
slight shake
cinematic POV
slow walking movement
environment scanning

Character:
male exploration vlogger using uploaded reference face

Narration (male voice English):
"This place is unbelievable... I have never seen anything like this before."

Sound Design:
ambient wind
distant strange noises
environmental echoes
footsteps
subtle horror atmosphere

Visual Style:
hyper realistic
cinematic
documentary exploration
8k realism
high detail environment

Duration:
6 seconds
`

output+=createBlock("VIDEO PROMPT SCENE "+i,videoPrompt)

}

document.getElementById("output").innerHTML=output

}


function createBlock(title,text){

return `

<h3>${title}</h3>

<textarea>${text}</textarea>

<button class="copyBtn" onclick="copyText(this)">Copy</button>

`

}


function copyText(btn){

const textarea=btn.previousElementSibling

textarea.select()

document.execCommand("copy")

}


function copyAll(){

const texts=document.querySelectorAll("textarea")

let combined=""

texts.forEach(t=>combined+=t.value+"\n\n")

navigator.clipboard.writeText(combined)

}

</script>

</body>
  </html>
